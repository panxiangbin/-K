name: 打包 Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: 安装并构建前端
        working-directory: client
        run: npm ci && npm run build

      - name: 安装 Capacitor（固定版本）
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: 初始化 Android 项目
        run: |
          npx cap add android
          npx cap sync android

      - name: 修复 Kotlin stdlib 版本冲突
        run: |
          cat >> android/build.gradle << 'GRADLE'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
                  }
              }
          }
          GRADLE

      - name: 设置 Gradle 可执行权限
        working-directory: android
        run: chmod +x gradlew

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 河南五十K-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 打印下载提示
        run: echo "✅ APK 构建成功！在 Actions 页面底部 Artifacts 区域下载 APK"
