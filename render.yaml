services:
  - type: web
    name: henan-50k
    runtime: node
    plan: free
    buildCommand: cd client && npm ci --include=dev --no-audit --no-fund && npm run build && cd ../server && npm ci --omit=dev --no-audit --no-fund
    startCommand: node -r ./server/bot-ai-hook.js server/index.js
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
