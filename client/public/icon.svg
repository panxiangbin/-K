<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1060"/>
      <stop offset="100%" style="stop-color:#0a1a0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e8a020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="70" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <!-- 花色 -->
  <text x="80" y="170" font-size="80" fill="#e8e8e8">♠</text>
  <text x="290" y="170" font-size="80" fill="#dc2626">♥</text>
  <text x="80" y="350" font-size="80" fill="#dc2626">♦</text>
  <text x="290" y="350" font-size="80" fill="#e8e8e8">♣</text>
  <!-- 五十K -->
  <text x="256" y="290" font-size="72" font-weight="900" text-anchor="middle" fill="url(#gold)" font-family="Arial Black, sans-serif">50K</text>
</svg>
