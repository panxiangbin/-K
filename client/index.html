<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="五十K" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>河南五十K</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;width:100%;overflow:hidden;background:#0d1117;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
    #root{padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
    /* 强制横屏提示：如果用户是竖屏，提示旋转 */
    #rotate-tip{display:none;position:fixed;inset:0;background:#0d1117;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#f5c518;font-size:18px;font-weight:700;text-align:center}
    #rotate-tip span{font-size:60px;animation:spin 2s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(orientation:portrait){#rotate-tip{display:flex}}
  </style>
</head>
<body>
  <!-- 竖屏提示 -->
  <div id="rotate-tip">
    <span>📱</span>
    请旋转手机横屏游戏
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
    // PWA 安装提示
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      window.__pwaPrompt = () => { deferredPrompt && deferredPrompt.prompt(); };
    });
    // 尝试锁定横屏（仅 Android Chrome 支持）
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{});
    }
  </script>
</body>
</html>
