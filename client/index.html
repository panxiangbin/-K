<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>河南五十K</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;width:100%;overflow:hidden;background:#0d1117;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
    #root{height:100%;width:100%;overflow:hidden;background:#0d1117;padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}

    /* 手机竖屏打开时，不再弹提示，而是把整个游戏画布强制旋转成横屏布局。 */
    body.force-landscape #root{
      position:fixed;
      top:50%;
      left:50%;
      width:100vh;
      height:100vw;
      transform:translate(-50%,-50%) rotate(90deg);
      transform-origin:center center;
      padding:env(safe-area-inset-left) env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // 旧版本注册过 Service Worker/PWA，容易缓存旧页面。当前先全部清掉，避免旧横屏提示或安装按钮残留。
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(reg){ reg.unregister(); });
      });
    }
    if (window.caches) {
      caches.keys().then(function(keys){
        keys.forEach(function(key){ caches.delete(key); });
      });
    }

    (function(){
      function isTouchDevice(){ return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; }
      function applyForcedLandscape(){
        var portrait = window.innerHeight > window.innerWidth;
        document.body.classList.toggle('force-landscape', isTouchDevice() && portrait);
      }

      // 尝试锁定系统横屏；普通手机浏览器经常会拒绝，所以同时保留 CSS 强制横屏兜底。
      function tryLockLandscape(){
        try {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function(){});
          }
        } catch(e) {}
      }

      window.addEventListener('resize', applyForcedLandscape);
      window.addEventListener('orientationchange', function(){ setTimeout(applyForcedLandscape, 300); });
      document.addEventListener('DOMContentLoaded', function(){ applyForcedLandscape(); tryLockLandscape(); });
      document.addEventListener('click', tryLockLandscape, { once:true });
      document.addEventListener('touchstart', tryLockLandscape, { once:true });
      applyForcedLandscape();
    })();
  </script>
</body>
</html>
